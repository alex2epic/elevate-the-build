      align-items: center;

      opacity: 0.5;

    .quiz-step-label {

      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;

    .quiz-close {

      color: rgba(255,255,255,0.5);
      font-size: 1.5rem;
      padding: 8px;

      min-width: 60px;

      overflow-y: auto;

      align-items: center;
      justify-content: center;
      padding: 20px;

      max-width: 560px;

    const WH_TOGGLE_MIN = 16, WH_TOGGLE_MAX = 184, WH_MAX_PHASE = 1000, WH_PWM_CYCLE = 20;
    const whPatterns = {
      success:   { pattern: [{ duration: 30, intensity: 0.5 }, { delay: 60, duration: 40, intensity: 1 }] },
      warning:   { pattern: [{ duration: 40, intensity: 0.8 }, { delay: 100, duration: 40, intensity: 0.6 }] },
      error:     { pattern: [{ duration: 40, intensity: 0.7 }, { delay: 40, duration: 40, intensity: 0.7 }, { delay: 40, duration: 40, intensity: 0.9 }, { delay: 40, duration: 50, intensity: 0.6 }] },

    function whModulate(duration, intensity) {
      if (intensity >= 1) return [duration];
      if (intensity <= 0) return [];
      var onTime = Math.max(1, Math.round(WH_PWM_CYCLE * intensity));
      var offTime = WH_PWM_CYCLE - onTime;
      var result = [], remaining = duration;
      while (remaining >= WH_PWM_CYCLE) { result.push(onTime, offTime); remaining -= WH_PWM_CYCLE; }
      if (remaining > 0) { var remOn = Math.max(1, Math.round(remaining * intensity)); result.push(remOn); var remOff = remaining - remOn; if (remOff > 0) result.push(remOff); }
      return result;
    }

    function whToVibratePattern(vibrations, defaultIntensity) {
      var result = [];
      for (var i = 0; i < vibrations.length; i++) {
        var vib = vibrations[i];
        var intensity = Math.max(0, Math.min(1, vib.intensity != null ? vib.intensity : defaultIntensity));
        var delay = vib.delay || 0;
        if (delay > 0) {
          if (result.length > 0 && result.length % 2 === 0) { result[result.length - 1] += delay; }
          else { if (result.length === 0) result.push(0); result.push(delay); }
        }
        var modulated = whModulate(vib.duration, intensity);

          continue;
        }
        for (var j = 0; j < modulated.length; j++) result.push(modulated[j]);

      return result;

        buttonText: 'Get My Free Quote',
        dynamicQuestion: "Almost done, {firstName}! What's the best number to reach you?"
      },
      // Step 10: Thank you
      {
        type: 'thankyou'
      }
    ];

    // ===== PERSONALIZATION =====
    const ISSUE_CONTEXT = {
      leaking: { msg: "Leaks can cause serious damage fast.", urgency: "high" },
      missing_damaged: { msg: "Exposed areas leave your home vulnerable.", urgency: "medium" },
      storm: { msg: "Storm damage needs immediate attention.", urgency: "high" },
      aging: { msg: "An aging roof is a ticking clock.", urgency: "medium" },
      just_checking: { msg: "Smart move getting ahead of problems.", urgency: "low" }
    };

    function personalize(text) {
      const a = quizState.answers;
      const firstName = a.name ? a.name.split(' ')[0] : '';
      return text
        .replace('{firstName}', firstName)
        .replace('{zip}', a.zip_code || 'your area')
        .replace('{issueMsg}', ISSUE_CONTEXT[a.roof_issue]?.msg || '');
    }

    // ===== RENDER FUNCTIONS =====
    function renderStep(stepIndex) {
      const step = QUIZ_STEPS[stepIndex];
      const container = document.getElementById('quizStepContent');
      const backBtn = document.getElementById('quizBack');
      const stepLabel = document.getElementById('quizStepLabel');
      const progressBar = document.getElementById('quizProgress');

      // Update header
      const questionSteps = 10;
      if (step.type === 'thankyou') {
        stepLabel.textContent = 'Complete';
        backBtn.classList.add('hidden');
      } else if (step.type === 'loading') {
        stepLabel.textContent = '';
        backBtn.classList.add('hidden');
      } else {
        const displayStep = Math.min(stepIndex + 1, questionSteps);
        stepLabel.textContent = 'Step ' + displayStep + ' of ' + questionSteps;
        backBtn.classList.toggle('hidden', stepIndex === 0);
      }

      // Progress
      const pct = step.type === 'thankyou' ? 100 : Math.round((stepIndex / questionSteps) * 100);
      progressBar.style.width = pct + '%';

      // Render
      let html = '';
      container.style.animation = 'none';
      container.offsetHeight; // reflow
      container.style.animation = 'fadeUp 0.4s ease forwards';

      switch (step.type) {
        case 'options':
          html = renderOptions(step);
          break;
        case 'grid':
          html = renderGrid(step);
          break;
        case 'input':
          html = renderInput(step);
          break;
        case 'phone':
          html = renderPhone(step);
          break;
        case 'loading':
          html = renderLoading(step);
          break;
        case 'thankyou':
          html = renderThankYou();
          break;
      }

      container.innerHTML = html;

      // Auto-focus inputs
      if (step.type === 'input' || step.type === 'phone') {
        const input = container.querySelector('input[type="text"], input[type="email"], input[type="tel"]');
        if (input) setTimeout(() => input.focus(), 400);
      }

      // Auto-advance loading
      if (step.type === 'loading') {
        setTimeout(() => {
          quizState.currentStep++;
          renderStep(quizState.currentStep);
        }, step.duration);
      }
    }

    function renderOptions(step) {
      let html = '<div class="quiz-step-eyebrow">' + step.eyebrow + '</div>';
      html += '<h2>' + step.question + '</h2>';
      html += '<div class="quiz-options">';
      step.options.forEach(opt => {
        html += '<button class="quiz-option" onclick="selectOption(\'' + step.key + '\', \'' + opt.value + '\')">'
          + '<span class="quiz-option-icon">' + opt.icon + '</span>'
          + opt.label
          + '</button>';
      });
      html += '</div>';
      if (step.showTrustBar) {
        html += '<div class="quiz-trust-bar">'
          + '<span>Licensed &amp; Insured</span>'
          + '<div class="trust-dot"></div>'
          + '<span>Free Estimates</span>'
          + '<div class="trust-dot"></div>'
          + '<span>5-Star Rated</span>'
          + '</div>';
      }
      return html;
    }

    function renderGrid(step) {
      let html = '';
      // Show personalized context message if available
      if (step.contextMsg && quizState.answers.roof_issue) {
        const ctx = ISSUE_CONTEXT[quizState.answers.roof_issue];
        if (ctx) {
          html += '<div style="text-align:center;margin-bottom:16px"><span class="quiz-success-badge" style="background:rgba(232,146,47,0.1);border-color:rgba(232,146,47,0.25);color:var(--orange)">'
            + ctx.msg
            + '</span></div>';
        }
      }
      html += '<div class="quiz-step-eyebrow">' + step.eyebrow + '</div>';
      html += '<h2>' + step.question + '</h2>';
      html += '<div class="quiz-options-grid">';
      step.options.forEach(opt => {
        html += '<button class="quiz-option" onclick="selectOption(\'' + step.key + '\', \'' + opt.value + '\')">'
          + '<span class="quiz-option-icon">' + opt.icon + '</span>'
          + opt.label
          + '</button>';
      });
      html += '</div>';
      return html;
    }

    function renderInput(step) {
      let html = '';
      const question = step.dynamicQuestion ? personalize(step.dynamicQuestion) : step.question;
      if (step.successBadge) {
        html += '<div style="text-align:center"><span class="quiz-success-badge">'
          + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>'
          + step.successBadge
          + '</span></div>';
      }
      html += '<div class="quiz-step-eyebrow">' + step.eyebrow + '</div>';
      html += '<h2>' + question + '</h2>';
      var safePattern = step.pattern.replace(/\\/g, '\\\\');
      html += '<div class="quiz-input-group">'
        + '<input class="quiz-input" type="' + step.inputType + '" placeholder="' + step.placeholder + '"'
        + ' id="quizInput" autocomplete="' + (step.key === 'email' ? 'email' : step.key === 'name' ? 'name' : 'off') + '"'
        + ' onkeydown="if(event.key===\'Enter\')submitInput(\'' + step.key + '\',\'' + safePattern + '\',\'' + step.errorMsg + '\')">'
        + '<div class="quiz-error" id="quizError" style="display:none"></div>'
        + '</div>';
      html += '<button class="quiz-submit" onclick="submitInput(\'' + step.key + '\',\'' + safePattern + '\',\'' + step.errorMsg + '\')">' + step.buttonText + '</button>';
      return html;
    }

    function renderPhone(step) {
      const question = step.dynamicQuestion ? personalize(step.dynamicQuestion) : step.question;
      let html = '<div class="quiz-step-eyebrow">' + step.eyebrow + '</div>';
      html += '<h2>' + question + '</h2>';
      html += '<div class="quiz-input-group">'
        + '<input class="quiz-input" type="tel" placeholder="' + step.placeholder + '" id="quizInput"'
        + ' autocomplete="tel" onkeydown="if(event.key===\'Enter\')submitPhone()">'
        + '<div class="quiz-error" id="quizError" style="display:none"></div>'
        + '</div>';
      html += '<div class="quiz-consent">'
        + '<input type="checkbox" id="quizConsent" checked>'
        + '<label for="quizConsent">By submitting, I agree to receive a call, text, or email regarding my quote. Standard rates apply. <a href="#">Privacy Policy</a></label>'
        + '</div>';
      html += '<button class="quiz-submit" onclick="submitPhone()" style="margin-top:20px">' + step.buttonText + '</button>';
      return html;
    }

    function renderLoading(step) {
      const zip = quizState.answers.zip_code || '';
      const loadQ = zip ? 'Checking availability near ' + zip + '...' : step.question;
      return '<div class="quiz-loading">'
        + '<div class="quiz-spinner"></div>'
        + '<h2>' + loadQ + '</h2>'
        + '<p>' + step.loadingText + '</p>'
        + '</div>';
    }

    function renderThankYou() {
      const firstName = quizState.answers.name ? quizState.answers.name.split(' ')[0] : '';
      const greeting = firstName ? "You're All Set, " + firstName + "!" : "You're All Set!";
      return '<div class="quiz-thankyou">'
        + '<div class="quiz-thankyou-icon">&#10003;</div>'
        + '<h2>' + greeting + '</h2>'
        + '<p>Your free roofing quote request has been submitted. Book a time below to speak with our team, or we\'ll reach out within 24 hours.</p>'
        + '<div class="quiz-calendly-wrap">'
        + '<div class="quiz-calendly-placeholder" id="calendlyEmbed">'
        + '<!-- TODO: Replace with Calendly inline embed -->'
        + '<!-- <div class="calendly-inline-widget" data-url="CALENDLY_LINK" style="min-width:320px;height:630px;"></div> -->'
        + '<!-- <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async><\/script> -->'
        + '<h3>Schedule Your Call</h3>'
        + '<p>Calendly booking widget will appear here.<br>Replace this placeholder with your Calendly embed code.</p>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    // ===== QUIZ ACTIONS =====
    function selectOption(key, value) {
      haptic('selection');
      quizState.answers[key] = value;
      quizState.currentStep++;
      syncLead(); // partial save on every step
      setTimeout(function() { haptic('light'); }, 150); // confirm tap on step advance
      renderStep(quizState.currentStep);
    }

    function submitInput(key, pattern, errorMsg) {
      const input = document.getElementById('quizInput');
      const error = document.getElementById('quizError');
      const val = input.value.trim();

      if (!val || !new RegExp(pattern).test(val)) {
        haptic('error');
        input.classList.add('error');
        error.textContent = errorMsg;
        error.style.display = 'block';
        return;
      }

      haptic('soft');
      input.classList.remove('error');
      error.style.display = 'none';
      quizState.answers[key] = val;
      quizState.currentStep++;
      syncLead(); // partial save
      renderStep(quizState.currentStep);
    }

    function submitPhone() {
      const input = document.getElementById('quizInput');
      const error = document.getElementById('quizError');
      const consent = document.getElementById('quizConsent');
      const val = input.value.trim().replace(/\D/g, '');

      if (val.length < 10) {
        haptic('error');
        input.classList.add('error');
        error.textContent = 'Please enter a valid phone number';
        error.style.display = 'block';
        return;
      }

      if (!consent.checked) {
        haptic('error');
        error.textContent = 'Please agree to the terms to continue';
        error.style.display = 'block';
        return;
      }

      haptic('success');
      input.classList.remove('error');
      error.style.display = 'none';
      quizState.answers.phone = val;

      syncLead(); // final save with phone
      quizState.currentStep++;
      renderStep(quizState.currentStep);

      // Fire Meta Pixel on final submit
      if (typeof fbq !== 'undefined') { fbq('track', 'Lead', quizState.answers); }
    }

    function closeFunnel() {
      haptic('light');
      window.location.href = 'index.html';
    }

    function quizPrev() {
      if (quizState.currentStep > 0) {
        haptic('selection');
        quizState.currentStep--;
        if (QUIZ_STEPS[quizState.currentStep].type === 'loading') {
          quizState.currentStep--;
        }
        renderStep(quizState.currentStep);
      }
    }

    // ===== PARTIAL LEAD SYNC (fires on every step) =====
    let syncTimeout = null;
    function syncLead() {
      // Debounce to avoid hammering API on rapid clicks
      clearTimeout(syncTimeout);
      syncTimeout = setTimeout(_doSync, 300);
    }

    async function _doSync() {
      const payload = {
        session_id: quizState.sessionId,
        client_id: CLIENT_ID,
        source: SOURCE,
        steps_completed: quizState.currentStep,
        ...quizState.answers
      };

      try {
        await fetch(SUPABASE_URL + '/functions/v1/client-lead-submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error('Sync error:', err);
      }
    }

    // ===== ONBLUR: save contact fields immediately =====
    document.addEventListener('blur', (e) => {
      if (e.target.classList && e.target.classList.contains('quiz-input')) {
        const val = e.target.value.trim();
        if (!val) return;
        const step = QUIZ_STEPS[quizState.currentStep];
        if (step && step.key && (step.key === 'name' || step.key === 'email' || step.key === 'phone' || step.key === 'zip_code')) {
          quizState.answers[step.key] = step.key === 'phone' ? val.replace(/\D/g, '') : val;
          syncLead();
        }
      }
    }, true);

    // ===== PHONE FORMAT =====
    document.addEventListener('input', (e) => {
      if (e.target.type === 'tel') {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 0) {
          if (val.length <= 3) {
            val = '(' + val;
          } else if (val.length <= 6) {
            val = '(' + val.slice(0,3) + ') ' + val.slice(3);
          } else {
            val = '(' + val.slice(0,3) + ') ' + val.slice(3,6) + '-' + val.slice(6,10);
          }
        }
        e.target.value = val;
      }
    });

    // ===== INIT: Start quiz immediately =====
    renderStep(0);
  </script>

</body>
</html>
